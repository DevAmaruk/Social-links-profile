<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <div class="card-container">
        <img src="assets/images/Jonathan.png" alt="profile" class="profile" />
        <section>
          <h1 class="name">Jonathan Guthauser</h1>
          <h2 class="location">Geneva, Switzerland</h2>
          <p class="job__title">"Frontend Developer"</p>
        </section>
        <section class="social__links">
          <a href="https://github.com/DevAmaruk" target="_blank" class="buttons"
            >GitHub</a
          >
          <a
            href="https://www.frontendmentor.io/profile/DevAmaruk"
            target="_blank"
            class="buttons"
            >Frontend Mentor</a
          >
          <a
            href="https://www.linkedin.com/in/jguthauser"
            target="_blank"
            class="buttons"
            >LinkedIn</a
          >
        </section>
      </div>
      <section class="attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ"
          target="_blank"
          class="challenge"
          >Frontend Mentor</a
        >. Coded by Devamaruk.
      </section>
    </main>
  </body>
</html>
